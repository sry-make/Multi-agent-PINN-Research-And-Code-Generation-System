[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra
markers =
    unit: Fast pure-logic tests with no external dependencies.
    integration: Cross-module contract tests with mocked external services.
    workflow: End-to-end scenario tests for user-facing flows.
    perf: Lightweight performance and budget tests.
    external: Tests that require Ollama, Docker, Chroma, or other live services.
